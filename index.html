<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Perwakilan & Usul MAT DPPKKN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; /* Light Theme Background */
            color: #1e293b;
            background-image: radial-gradient(at 0% 0%, hsla(160,100%,90%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(142,100%,92%,1) 0, transparent 50%);
            background-attachment: fixed;
        }
        /* Light Glassmorphism Effect */
        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
        }
        
        input[type="text"], input[type="number"], input[type="tel"], select, textarea { 
            background: rgba(255, 255, 255, 0.9) !important; 
            color: #0f172a !important; 
            border: 1px solid #cbd5e1 !important; 
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: #10b981 !important; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); 
        }
        .swal2-popup { border-radius: 1.5rem !important; }
    </style>
</head>
<body class="min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto text-center mb-10">
        <img src="https://raw.githubusercontent.com/kamarul95-cloud/hostqamarul/refs/heads/main/logo%20logo%20pemuda%20pas.png" class="h-24 mx-auto mb-6 drop-shadow-xl">
        <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter text-emerald-600">MAT DPPKKN</h1>
        <p class="text-slate-600 font-bold tracking-[0.2em] text-sm mt-2 uppercase">Borang Perwakilan & Usul Cawangan</p>
        
        <div class="mt-6 inline-block bg-white/60 border border-emerald-500/20 rounded-xl p-4 text-xs font-bold text-slate-600 max-w-xl shadow-sm">
            <i class="fa-solid fa-circle-exclamation text-emerald-500 text-lg mb-2 block"></i>
            Setiap cawangan hendaklah menghantar <span class="text-emerald-600">7 orang perwakilan</span> ke MAT kali ini. Sila tanda " - " jika maklumat usul tidak berkenaan.
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <form id="matForm" class="space-y-6">
            
            <div class="glass p-8 rounded-2xl space-y-6">
                <h2 class="text-emerald-600 font-extrabold uppercase text-xs tracking-widest border-b border-slate-200 pb-3 flex items-center gap-2">
                    <i class="fa-solid fa-sitemap"></i> Maklumat Kawasan
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">DUN *</label>
                        <select name="dun" required class="w-full p-3.5 rounded-xl text-sm font-bold cursor-pointer bg-slate-100">
                            <option value="Bukit Tunggal" selected>Bukit Tunggal</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Cawangan *</label>
                        <select name="cawangan" id="cawanganDropdown" required class="w-full p-3.5 rounded-xl text-sm font-semibold cursor-pointer"></select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-2 block">
                        <i class="fa-solid fa-phone mr-1"></i> No Telefon PIC (Untuk Terima Borang Siap) *
                    </label>
                    <input type="tel" name="no_tel_pic" required placeholder="CONTOH: 01XXXXXXXX" class="w-full p-3.5 rounded-xl text-sm font-bold">
                </div>
            </div>

            <div id="perwakilanContainer" class="space-y-6"></div>

            <div class="glass p-8 rounded-2xl space-y-6">
                <h2 class="text-emerald-600 font-extrabold uppercase text-xs tracking-widest border-b border-slate-200 pb-3 flex items-center gap-2">
                    <i class="fa-solid fa-bullhorn"></i> Usul Cawangan (Jika Ada)
                </h2>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Usul 1 *</label>
                        <textarea name="usul_1" required rows="2" class="w-full p-3.5 rounded-xl text-sm">-</textarea>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Usul 2 *</label>
                        <textarea name="usul_2" required rows="2" class="w-full p-3.5 rounded-xl text-sm">-</textarea>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Usul 3 *</label>
                        <textarea name="usul_3" required rows="2" class="w-full p-3.5 rounded-xl text-sm">-</textarea>
                    </div>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-2xl shadow-[0_10px_20px_rgba(16,185,129,0.3)] transition transform active:scale-95 uppercase tracking-widest text-sm mt-8">
                Hantar Pendaftaran Perwakilan
            </button>
        </form>

        <div class="text-center text-slate-400 text-xs mt-12 pb-8">
            Sistem Pendaftaran Digital Pemuda Kuala Nerus<br>
            <span class="opacity-70 font-semibold">Developed by Qamar</span>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ MASUKKAN URL GOOGLE APPS SCRIPT BOS DI SINI (Pastikan diakhiri dengan /exec)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYKgJQlP2AIoadYHNcTV6zEKR-J6xc1J34yP5yvzMD3XKUwoA169Hfw1oQIke_yZe_tw/exec";
        // ==========================================

        const cawanganList = [
            "BATU ENAM", "PAYA LIMA AMAS", "TUAN MANDAK", "PENGKALAN ARANG", "TEBAUK", "PAK KATAK", 
            "TAMAN DESA JAYA", "BANGGOL AIR LILIH", "BUKIT TUNGGAL", "TAMAN BUKIT DATU", "BUKIT KANDIS", 
            "BUKIT DATU", "SEB TUAN CHIK", "BUKIT TOK RIS", "SERDANG BARU", "PAKR BUKIT TUNGGAL", 
            "GONG KIJANG", "GONG SENTUL", "PULAU KETAM", "PULAU SEKATI", "DUYUNG BESAR", "DUYUNG KECIL", 
            "DUYUNG WAN SU", "KELAB AYA", "BUKIT TUMBUH", "BANGGOL PAUH", "SEBERANG BUKIT TUMBUH"
        ];

        const jawatanList = [
            "Ketua Pemuda", "Timbalan Ketua", "Setiausaha", "Penolong Setiausaha", "Bendahari", "AJK", "Tiada"
        ];

        document.addEventListener("DOMContentLoaded", function() {
            // Setup Dropdown Cawangan
            const cawDropdown = document.getElementById('cawanganDropdown');
            let htmlCaw = '<option value="">-- Pilih Cawangan --</option>';
            cawanganList.forEach(c => htmlCaw += `<option value="${c}">${c}</option>`);
            cawDropdown.innerHTML = htmlCaw;

            // Generate 7 Form Perwakilan (Susunan: IC -> Nama -> Jawatan)
            const container = document.getElementById('perwakilanContainer');
            let htmlPerwakilan = '';
            
            for (let i = 1; i <= 7; i++) {
                let jwOptions = '<option value="">-- Pilih Jawatan --</option>';
                jawatanList.forEach(j => jwOptions += `<option value="${j}">${j}</option>`);

                htmlPerwakilan += `
                <div class="glass p-6 rounded-2xl relative overflow-hidden border-t-4 border-emerald-400">
                    <div class="absolute -right-6 top-4 bg-emerald-100 text-emerald-700 text-[9px] font-black px-10 py-1.5 rotate-45 border border-emerald-200">WAKIL ${i}</div>
                    <h3 class="text-emerald-600 font-extrabold mb-4 uppercase text-xs tracking-widest"><i class="fa-solid fa-user-check mr-1"></i> Perwakilan ${i}</h3>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="relative">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">No Kad Pengenalan *</label>
                                <input type="number" name="ic_${i}" required class="w-full p-3 rounded-xl text-sm font-bold" placeholder="TANPA SENGKANG" onkeyup="semakIC(this, ${i})">
                                <i id="icon-ic-${i}" class="fa-solid fa-id-card absolute right-4 top-9 text-slate-300 transition-all"></i>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">Nama Penuh (HURUF BESAR) *</label>
                                <input type="text" name="nama_${i}" id="nama_${i}" required class="w-full p-3 rounded-xl uppercase text-sm font-bold" placeholder="NAMA PERWAKILAN">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">Jawatan *</label>
                            <select name="jawatan_${i}" required class="w-full p-3 rounded-xl text-sm font-semibold cursor-pointer">
                                ${jwOptions}
                            </select>
                        </div>
                    </div>
                </div>`;
            }
            container.innerHTML = htmlPerwakilan;
        });

// --- FUNGSI AUTO-FILL IC (NAMA + JAWATAN) ---
        let typingTimer;
        function semakIC(inputEl, index) {
            clearTimeout(typingTimer);
            const icValue = inputEl.value.trim();
            const iconEl = document.getElementById(`icon-ic-${index}`);
            const namaEl = document.getElementById(`nama_${index}`);
            const jawatanEl = document.querySelector(`select[name="jawatan_${index}"]`);

            if(icValue.length >= 10) {
                // Tunjuk loading spinner
                iconEl.className = "fa-solid fa-spinner fa-spin absolute right-4 top-9 text-emerald-500 transition-all";
                
                typingTimer = setTimeout(async () => {
                    try {
                        const res = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ action: "checkIC", ic: icValue })
                        });
                        
                        const data = await res.json();
                        
                        if(data.found) {
                            // Masukkan Nama Auto
                            namaEl.value = data.nama;
                            
                            // Masukkan Jawatan Auto (Kalau Wujud & Padan dalam senarai)
                            if (data.jawatan) {
                                // Loop semua option dalam dropdown tu cari jawatan yang sama
                                for (let option of jawatanEl.options) {
                                    if (option.value.toLowerCase() === data.jawatan.toLowerCase()) {
                                        option.selected = true;
                                        jawatanEl.classList.add("bg-emerald-50", "border-emerald-300");
                                        break;
                                    }
                                }
                            }

                            iconEl.className = "fa-solid fa-check-circle absolute right-4 top-9 text-emerald-500 transition-all";
                            namaEl.classList.add("bg-emerald-50", "border-emerald-300"); // Highlight hijau
                            
                            // Buang highlight selepas 1.5 saat
                            setTimeout(() => {
                                namaEl.classList.remove("bg-emerald-50", "border-emerald-300");
                                jawatanEl.classList.remove("bg-emerald-50", "border-emerald-300");
                            }, 1500);
                        } else {
                            iconEl.className = "fa-solid fa-id-card absolute right-4 top-9 text-slate-300 transition-all";
                        }
                    } catch(err) {
                        console.error("Ralat Auto-Fill: ", err);
                        iconEl.className = "fa-solid fa-id-card absolute right-4 top-9 text-slate-300 transition-all";
                    }
                }, 800);
            } else {
                iconEl.className = "fa-solid fa-id-card absolute right-4 top-9 text-slate-300 transition-all";
            }
        }

        // --- SUBMIT BORANG ---
        document.getElementById('matForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> SEDANG MEMPROSES...';

            const formData = new FormData(e.target);
            const dataObj = Object.fromEntries(formData.entries());

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(dataObj)
            })
            .then(res => res.json())
            .then(response => {
                if(response.status === 'success') {
                    // SWEETALERT DENGAN TRADEMARK QAMAR
                    Swal.fire({
                        icon: 'success',
                        title: 'BERJAYA DIHANTAR!',
                        html: `
                            <div class="space-y-3 mt-2 text-sm text-slate-600">
                                <p>Maklumat perwakilan dan usul cawangan anda telah direkodkan.</p>
                                <div class="mt-6 pt-4 border-t border-slate-200">
                                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">
                                        Sistem dibangunkan oleh <span class="text-emerald-600 font-bold">Qamar</span> 🚀
                                    </p>
                                </div>
                            </div>
                        `,
                        confirmButtonColor: '#10b981',
                        background: '#ffffff',
                        color: '#1e293b'
                    }).then(() => location.reload());
                } else {
                    throw new Error(response.message);
                }
            })
            .catch(err => {
                Swal.fire({
                    icon: 'error',
                    title: 'RALAT SISTEM',
                    text: 'Gagal memproses pendaftaran. (' + err.message + ')',
                    confirmButtonColor: '#10b981', background: '#ffffff', color: '#1e293b'
                });
                btn.disabled = false;
                btn.innerHTML = 'Hantar Pendaftaran Perwakilan';
            });
        });
    </script>
</body>
</html>
